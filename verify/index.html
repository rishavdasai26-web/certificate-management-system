<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    /* ── Loading ── */
    .loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 18px; margin-top: 80px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(13,31,60,0.12);
      border-top-color: #c9a227;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #5a7090; letter-spacing: 0.05em; }

    /* ── Error ── */
    .error-wrap {
      display: none; flex-direction: column;
      align-items: center; gap: 14px;
      margin-top: 80px; text-align: center;
    }
    .error-icon { font-size: 48px; line-height: 1; }
    .error-title { font-size: 18px; font-weight: 700; color: #0d1f3c; }
    .error-msg {
      font-size: 14px; color: #6b7a8d;
      max-width: 320px; line-height: 1.6;
    }

    /* ── Card ── */
    .card {
      display: none;
      background: #fff; border-radius: 16px;
      max-width: 480px; width: 100%;
      box-shadow: 0 6px 32px rgba(0,0,0,0.10);
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-head {
      background: linear-gradient(135deg, #0d1f3c 0%, #1a3560 100%);
      padding: 32px 24px 26px; text-align: center;
    }
    .org-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(14px,4vw,20px);
      color: #e8c44a; letter-spacing: 0.13em;
      text-transform: uppercase; line-height: 1.3;
    }
    .org-sub {
      font-size: 10.5px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em; margin-top: 5px;
    }
    .gold-bar {
      width: 44px; height: 2px;
      background: linear-gradient(90deg,#c9a227,#e8c44a,#c9a227);
      margin: 10px auto 0; border-radius: 2px;
    }

    .status-wrap {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 22px 0; padding: 14px 18px;
      border-radius: 10px; font-weight: 700; font-size: 14px;
    }
    .status-wrap.valid  { background:#eafaf2; border:1.5px solid #2ecc71; color:#1a7a42; }
    .status-wrap.invalid{ background:#fdf2f2; border:1.5px solid #e74c3c; color:#a93226; }

    .status-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .status-icon.valid   { background: #2ecc71; }
    .status-icon.invalid { background: #e74c3c; }
    .status-icon svg { width: 20px; height: 20px; fill: #fff; }

    .card-body { padding: 20px 22px 26px; }

    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    tr { border-bottom: 1px solid #f3f3f3; }
    tr:last-child { border-bottom: none; }
    td { padding: 11px 6px; vertical-align: top; line-height: 1.45; font-size: 13.5px; }
    .lbl {
      color: #6b7a8d; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; font-size: 10px; width: 36%; padding-right: 10px;
    }
    .val { color: #0d1f3c; font-weight: 500; }

    .foot {
      margin-top: 20px; font-size: 11px; color: #c0cad8;
      border-top: 1px solid #f3f3f3; padding-top: 14px; line-height: 1.6;
    }
    .page-foot {
      margin-top: 24px; font-size: 11px;
      color: #a8b4c4; text-align: center;
    }
  </style>
</head>
<body>

  <!-- Loading (default) -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <p class="loading-text">Verifying certificate, please wait…</p>
  </div>

  <!-- Error -->
  <div class="error-wrap" id="errorWrap">
    <div class="error-icon">⚠️</div>
    <p class="error-title">Invalid Verification Link</p>
    <p class="error-msg">
      Could not read the Application Number from the URL.
      Please scan the QR code on the original certificate again.
    </p>
  </div>

  <!-- Result Card -->
  <div class="card" id="resultCard">
    <div class="card-head">
      <!-- ✅ Update org name here if needed -->
      <div class="org-name">Pamar Pranare</div>
      <div class="org-sub">Run by B.S.P.S.S. | Registered by Govt. of East Bengal</div>
      <div class="gold-bar"></div>
    </div>
    <div class="status-wrap" id="statusWrap">
      <div class="status-icon" id="statusIcon">
        <svg id="statusSvg" viewBox="0 0 24 24"></svg>
      </div>
      <span id="statusText"></span>
    </div>
    <div class="card-body">
      <table id="detailTable"></table>
      <p class="foot" id="footNote"></p>
    </div>
  </div>

  <p class="page-foot" id="pageFoot" style="display:none;">
    Verified via Pamar Pranare Certificate System
  </p>

  <script>
    // ================================================================
    // ✅ CONFIGURATION
    // Replace with your deployed Apps Script Web App URL
    // ================================================================
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMjr4k934XHDf1QUE50Kytpu2ctCh1dGmHR7CgfGaS0a-cO-uAsjku3s-EwxInyhmA8Q/exec";

    // getAppNo() removed — system now uses secure tokens

    // ================================================================
    // UI HELPERS
    // ================================================================
    function showError(msg) {
      document.getElementById("loadingWrap").style.display = "none";
      var wrap = document.getElementById("errorWrap");
      if (msg) wrap.querySelector(".error-msg").textContent = msg;
      wrap.style.display = "flex";
    }

    function showResult(data) {
      document.getElementById("loadingWrap").style.display = "none";

      var isValid    = data.success;
      var statusWrap = document.getElementById("statusWrap");
      var statusIcon = document.getElementById("statusIcon");
      var statusSvg  = document.getElementById("statusSvg");
      var statusText = document.getElementById("statusText");
      var table      = document.getElementById("detailTable");
      var footNote   = document.getElementById("footNote");

      statusWrap.className = "status-wrap " + (isValid ? "valid" : "invalid");
      statusIcon.className = "status-icon "  + (isValid ? "valid" : "invalid");

      if (isValid) {
        statusSvg.innerHTML  = "<path d='M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z'/>";
        statusText.textContent = "✓ Certificate Verified";
      } else {
        statusSvg.innerHTML  = "<path d='M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4l5.6 5.6L5 17.6 6.4 19l5.6-5.6 5.6 5.6 1.4-1.4-5.6-5.6z'/>";
        statusText.textContent = "✗ Certificate Not Found";
      }

      if (isValid) {
        // ✅ STEP TO ADD A NEW FIELD: add a new object here
        var fields = [
          { label: "Application No.",   value: data.appNo         || "—" },
          { label: "Certificate No.",   value: data.certificateNo || "—" },
          { label: "Name of Recipient", value: data.name          || "—" },
          { label: "Date Issued",       value: data.date          || "—" },
          // { label: "Course Name",    value: data.course        || "—" },
        ];

        table.innerHTML = fields.map(function(f) {
          return "<tr><td class='lbl'>" + f.label + "</td>"
               + "<td class='val'>" + f.value + "</td></tr>";
        }).join("");

        footNote.innerHTML =
          "This certificate was officially issued by "
          + "<strong>Pamar Pranare</strong>. "
          + "For any concerns, contact the organization directly.";
      } else {
        table.innerHTML =
          "<tr><td colspan='2' style='text-align:center;color:#6b7a8d;"
          + "padding:16px 0;font-size:14px;line-height:1.7;'>"
          + "No certificate record found.<br>"
          + "This certificate may be invalid or revoked.</td></tr>";
        footNote.textContent = "";
      }

      document.getElementById("resultCard").style.display = "block";
      document.getElementById("pageFoot").style.display   = "block";
    }

    // ================================================================
    // GET VERIFY CODE FROM URL
    // QR code URL format: /verify?vc=PERMANENT_CODE
    // vc is a permanent random code stored in Column G of the sheet.
    // It never expires — printed certificates work forever.
    // vc cannot be guessed — it is random and unrelated to appNo.
    // ================================================================
    function getVerifyCode() {
      var vc = null;

      // Method 1: own window location (external hosting — works directly)
      try {
        var p = new URLSearchParams(window.location.search);
        vc = p.get("vc");
      } catch(e) {}

      // Method 2: parse from full href
      if (!vc) {
        try {
          var m = window.location.href.match(/[?&]vc=([^&#+]+)/i);
          if (m) vc = decodeURIComponent(m[1]);
        } catch(e) {}
      }

      // Method 3: try parent window (Google Sites fallback)
      if (!vc) {
        try {
          var parentHref = window.parent.location.href;
          var m2 = parentHref.match(/[?&]vc=([^&#+]+)/i);
          if (m2) vc = decodeURIComponent(m2[1]);
        } catch(e) {}
      }

      return vc ? vc.trim() : null;
    }

    // ================================================================
    // BROWSER FINGERPRINT (for rate limiting support)
    // ================================================================
    function getFingerprint() {
      try {
        return btoa(
          (navigator.language || "") + "|" +
          (screen.width + "x" + screen.height) + "|" +
          (Intl.DateTimeFormat().resolvedOptions().timeZone || "")
        ).replace(/=/g,"").substring(0, 32);
      } catch(e) { return "unknown"; }
    }

    // ================================================================
    // MAIN — runs on page load
    // ================================================================
    window.addEventListener("load", function() {
      setTimeout(function() {

        var vc = getVerifyCode();
        console.log("Verify code found:", vc ? vc.substring(0,6) + "..." : "null");

        if (!vc) {
          showError(
            "Invalid or missing verification code. "
            + "Please scan the QR code on the original certificate again."
          );
          return;
        }

        var fp       = getFingerprint();
        var callbackName = "verifyCb_" + Date.now();

        // ── JSONP approach ────────────────────────────────────────
        // fetch() from external hosting to Apps Script is blocked
        // by CORS. JSONP (script tag injection) bypasses CORS because
        // <script src="..."> is not subject to CORS restrictions.
        // Apps Script supports JSONP via the &callback= parameter.
        // ─────────────────────────────────────────────────────────

        // Set a timeout in case the script never loads
        var timeoutId = setTimeout(function() {
          cleanup();
          showResult({ success: false });
          console.error("Verification request timed out.");
        }, 10000); // 10 second timeout

        function cleanup() {
          clearTimeout(timeoutId);
          delete window[callbackName];
          var old = document.getElementById("jsonp-script");
          if (old) old.parentNode.removeChild(old);
        }

        // Define the callback function that Apps Script will call
        window[callbackName] = function(data) {
          cleanup();
          if (data.code === "RATE_LIMITED") {
            showError("Too many requests. Please wait a moment and try again.");
          } else if (data.code === "NOT_FOUND" || !data.success) {
            showResult({ success: false });
          } else {
            showResult(data);
          }
        };

        // Build the JSONP URL
        var url = APPS_SCRIPT_URL
                + "?verifyJson=true"
                + "&vc="       + encodeURIComponent(vc)
                + "&_fp="      + encodeURIComponent(fp)
                + "&callback=" + callbackName;

        // Inject script tag
        var script    = document.createElement("script");
        script.id     = "jsonp-script";
        script.src    = url;
        script.onerror = function() {
          cleanup();
          showResult({ success: false });
          console.error("JSONP script load error.");
        };
        document.body.appendChild(script);

      }, 300);
    });
  </script>

</body>
</html>
